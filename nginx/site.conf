# Main website
server {
    listen 80;
    server_name yoav.ch;

    root /var/www/website;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# Music subdomain
server {
    listen 80;
    server_name schmoundcloud.yoav.ch;

    root /var/www/schmoundcloud;
    index index.html;

    location / {
        proxy_pass http://node-server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # cache music files
    location /music/ {
        proxy_pass http://node-server:3000/music/;
        expires 30d;
    }

    # cache waveforms
    location /waveforms/ {
        proxy_pass http://node-server:3000/waveforms/;
        expires 30d;
    }
}
