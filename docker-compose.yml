services:
  nginx:
    image: nginx:alpine
    container_name: mysite-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./website:/var/www/website:ro
      - ./schmoundcloud:/var/www/schmoundcloud:ro
    networks:
      - mysite

  node-server:
    image: node:20-alpine
    container_name: node-server
    working_dir: /app
    command: node server.js
    volumes:
      - ./schmoundcloud:/app
    restart: unless-stopped
    networks:
      - mysite

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mysite-cloudflared
    restart: unless-stopped
    command: tunnel run mysite
    volumes:
      - ./cloudflared:/etc/cloudflared
    depends_on:
      - nginx
    networks:
      - mysite

networks:
  mysite:
    driver: bridge